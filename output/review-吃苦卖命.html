<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>文案审核台 · Script Studio</title>
<style>
  :root{
    --bg:#f5f6f8;--card:#fff;--border:#e4e7eb;--text:#1f2329;--muted:#8a9099;
    --high:#e34d59;--high-bg:#fff0f0;--med:#d87a00;--med-bg:#fff7e6;
    --low:#00a870;--low-bg:#e6f9f0;--accent:#3370ff;--ok:#00a870;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;flex-shrink:0;}
  header h1{font-size:18px;margin:0 0 6px;font-weight:600;}
  .controls{display:flex;align-items:center;gap:14px;}
  .controls label{font-size:13px;font-weight:600;white-space:nowrap;}
  .slider-wrap{flex:1;}
  input[type=range]{width:100%;accent-color:var(--accent);height:4px;}
  .ticks{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:4px;}

  /* 电脑端：左列上下(原文/输出)，右列卡片跨整列 */
  main{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    grid-template-areas:"original items" "output items";
    gap:16px;padding:16px 24px;max-width:1500px;margin:0 auto;width:100%;
    flex:1 1 0;min-height:0;align-items:stretch;
  }
  .panel-original{grid-area:original;}
  .panel-output{grid-area:output;}
  .panel-items{grid-area:items;}

  .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
  .panel h2{font-size:13px;margin:0 0 12px;color:var(--muted);font-weight:500;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;}
  .sort-bar{display:flex;gap:6px;}
  .sort-btn{border:1px solid var(--border);background:#fff;color:var(--muted);padding:3px 11px;border-radius:14px;font-size:11px;cursor:pointer;font-weight:500;white-space:nowrap;}
  .sort-btn:hover{background:#f2f3f5;}
  .sort-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  #original{font-size:14px;line-height:2.1;white-space:pre-wrap;word-break:break-word;flex:1 1 auto;min-height:0;overflow:auto;padding:12px;border:1px solid var(--border);border-radius:8px;}
  mark.h{background:var(--high-bg);color:var(--high);border-bottom:2px solid var(--high);padding:0 2px;border-radius:2px;}
  mark.m{background:var(--med-bg);color:var(--med);border-bottom:2px solid var(--med);padding:0 2px;border-radius:2px;}
  mark.l{background:var(--low-bg);color:var(--low);border-bottom:2px dashed var(--low);padding:0 2px;border-radius:2px;}
  #items{display:flex;flex-direction:column;gap:10px;flex:1 1 auto;overflow:auto;padding-right:4px;}
  .card{border:1px solid var(--border);border-radius:8px;padding:12px;transition:.15s;flex-shrink:0;}
  .card.adopted{border-color:var(--ok);background:#f5fcf8;}
  .tag{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;}
  .tag.high{background:var(--high-bg);color:var(--high);}
  .tag.medium{background:var(--med-bg);color:var(--med);}
  .tag.low{background:var(--low-bg);color:var(--low);}
  .cat{font-size:12px;color:var(--muted);margin-left:6px;}
  .line{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:14px;margin:8px 0;}
  .line .from{text-decoration:line-through;color:var(--muted);}
  .line .arrow{color:var(--muted);}
  .edit-sug{flex:1;min-width:140px;font-size:14px;font-family:inherit;color:var(--ok);font-weight:600;border:1px dashed var(--ok);background:#f5fcf8;border-radius:5px;padding:5px 8px;outline:none;}
  .edit-sug:focus{border-style:solid;background:#fff;}
  .reason{font-size:12px;color:var(--muted);margin:6px 0 10px;line-height:1.6;}
  .actions{display:flex;gap:8px;}
  .btn{border:1px solid var(--border);background:#fff;padding:5px 14px;border-radius:6px;font-size:13px;cursor:pointer;}
  .btn:hover{background:#f2f3f5;}
  .btn.yes{color:var(--ok);border-color:var(--ok);}
  .btn.yes.on{background:var(--ok);color:#fff;}
  .btn.no{color:var(--muted);}
  .btn.no.on{background:#e4e7eb;color:var(--text);border-color:#c9cdd4;}
  .out-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;flex-wrap:wrap;flex-shrink:0;}
  .out-head h2{font-size:13px;margin:0;color:var(--muted);font-weight:500;}
  .out-head .btns{display:flex;gap:8px;}
  #output{width:100%;flex:1 1 auto;min-height:0;border:1px solid var(--border);border-radius:8px;padding:12px;font-size:14px;line-height:1.9;font-family:inherit;resize:none;color:var(--text);}
  #output:focus{border-color:var(--accent);}
  .copy{background:var(--accent);color:#fff;border:none;padding:7px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500;}
  .copy:hover{opacity:.9;}
  .split{background:#fff;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:6px;font-size:13px;cursor:pointer;}
  .split:hover{background:#f2f3f5;}
  .split.active{background:var(--low-bg);border-color:var(--low);color:var(--low);font-weight:600;}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1f2329;color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;opacity:0;transition:.2s;pointer-events:none;}
  .toast.show{opacity:.95;}

  /* ===== 移动端：原文 → 卡片 → 输出，纵向单栏 ===== */
  @media (max-width: 768px){
    html,body{height:auto;}
    body{display:block;min-height:auto;overflow:auto;}
    header{padding:12px 14px;}
    header h1{font-size:17px;}
    .controls{gap:10px;}
    .controls label{font-size:13px;}
    input[type=range]{height:8px;}
    .ticks{font-size:10px;margin-top:5px;}
    main{grid-template-columns:1fr;grid-template-rows:auto;grid-template-areas:"original" "items" "output";padding:12px;gap:12px;max-width:100%;flex:none;}
    .panel{padding:14px;border-radius:9px;overflow:visible;}
    .panel h2{font-size:13px;margin-bottom:10px;}
    .sort-btn{font-size:11px;padding:4px 11px;}
    #original{font-size:15px;line-height:1.95;overflow:visible;padding:0;border:none;border-radius:0;}
    #items{max-height:none;padding-right:0;gap:10px;overflow:visible;}
    .card{padding:12px;}
    .line{flex-direction:column;align-items:stretch;gap:5px;}
    .line .from{font-size:14px;}
    .line .arrow{display:none;}
    .edit-sug{min-width:100%;font-size:15px;padding:9px 10px;}
    .reason{font-size:12px;margin:6px 0;}
    .actions{gap:10px;}
    .btn{flex:1;padding:10px;font-size:14px;min-height:42px;}
    .out-head{flex-direction:column;align-items:stretch;gap:8px;}
    .out-head .btns{display:flex;gap:8px;}
    .copy,.split{flex:1;padding:11px;font-size:14px;min-height:44px;}
    #output{min-height:0;font-size:15px;line-height:1.8;resize:none;overflow:hidden;}
  }
</style>
</head>
<body>
<header>
  <h1>🛡️ 文案审核台 <span id="platform" style="font-size:12px;color:var(--muted);font-weight:400"></span></h1>
</header>

<main>
  <section class="panel panel-original">
    <h2>
      <span>原文</span>
      <button class="split" id="origSplitBtn">✂️ 字幕断句</button>
    </h2>
    <div id="original"></div>
  </section>
  <section class="panel panel-items">
    <h2>
      <span>采纳区</span>
      <span class="sort-bar">
        <button class="sort-btn on" data-sort="risk">⚠️ 危险程度</button>
        <button class="sort-btn" data-sort="text">📜 文案顺序</button>
      </span>
    </h2>
    <div id="items"></div>
  </section>
  <section class="panel panel-output">
    <div class="out-head">
      <h2>输出</h2>
      <div class="btns">
        <button class="split" id="splitBtn">✂️ 字幕断句</button>
        <button class="copy" id="copyBtn">📋 一键复制</button>
      </div>
    </div>
    <textarea id="output" placeholder="实时拼合修改后的文案"></textarea>
  </section>
</main>

<div class="toast" id="toast">已复制到剪贴板</div>

<script>
/* ===== _template.html：文案审核台模板。由 script-review skill 使用 =====
   生成流程：
   1) Bash:  cp "_template.html" "review-<主题>.html"
   2) Edit review-<主题>.html：把下面这行
        var REVIEW_DATA = { PLACEHOLDER };
      替换为实际审核数据对象，格式：
        var REVIEW_DATA = {
          verdict: "一句话总评",
          platform: "抖音 · 小红书",
          original: `原文（保留【角色】【镜头】等标记；标题钩子独立成行，不要塞进【】）`,
          splitOriginal: `断句版本（agent 按口播节奏预切好的字幕，每句<=10字；原文有什么标点就保留什么标点，不加不减；点「字幕断句」按钮切换）`,
          items: [
            { id:1, level:"high", category:"消极价值观", original:"原文精确子串", suggestion:"改写", splitSuggestion:"断句版改写", reason:"原因" },
            ...
          ]
        };
   约束：items.original 必须是 original 的精确子串（网页靠 indexOf 定位高亮+替换）；level 仅 high/medium/low。
   内容控制（断句、分句等）全部由 agent 完成，JS 只负责网页结构和交互。
   注意：注释内切勿出现可闭合块注释的符号组合，否则 JS 会报错。 */
var REVIEW_DATA = {
  verdict: "整体立意偏消极，否定努力+煽动劳资对立+摆烂价值观，高风险",
  platform: "抖音 · 小红书",
  original: `从小家里人都说：勤快饿不死，别人能出头，就是比你更能吃苦。
我听话进厂苦干，天天加班到深夜，放弃所有休假，熬了整整三年。
熬坏颈椎、熬出胃病、大把掉发，薪资只涨几百，老板还劝我勤劳自有回报。
好像我再拼命，也永远赶不上别人，只能认命埋头干活。
别被 KFC 了！这根本不是勤劳，是愚笨式自残！
老板挂天道酬勤哄你卖命，自己坐享红利，这套鸡汤你也信？
没资源没方向，瞎勤快一文不值！螺丝钉再拼，也变不了发动机。
累垮一身毛病，赚的钱连看病都不够，卖命到底图什么？
可以干活，但别卖命！拒绝无意义内耗，该摆烂就摆烂。
你的命，远比老板画的饼金贵，谁都别想消耗你！`,
  splitOriginal: `从小家里都说：
勤快饿不死，
别人能出头，
就是比你更能吃苦。

我听话进厂苦干，
天天加班到深夜，
放弃所有休假，
熬了整整三年。

熬坏颈椎、
熬出胃病、
大把掉发，

老板还劝我
勤劳自有回报。

好像我再拼命，
也永远赶不上别人，
只能认命埋头干活。

别被 KFC 了！
这根本不是勤劳，
是愚笨式自残！

老板挂天道酬勤
哄你卖命，
自己坐享红利，
这套鸡汤你也信？

没资源没方向，
瞎勤快一文不值！
螺丝钉再拼，
也变不了发动机。

累垮一身毛病，
赚的钱连看病都不够，
卖命到底图什么？

可以干活，
但别卖命！

该摆烂就摆烂。

你的命，
远比老板画的饼金贵，
谁都别想消耗你！`,
  items: [
    { id:1, level:"high", category:"违禁词", original:"自残", suggestion:"慢性透支", splitSuggestion:"慢性透支", reason:"抖音违禁词，涉嫌暴力内容，可能触发限流或封禁。改为「慢性透支」保留原意但规避风险。" },
    { id:2, level:"high", category:"消极价值观", original:"该摆烂就摆烂", suggestion:"该休息就休息", splitSuggestion:"该休息\n就休息。", reason:"「摆烂」是抖音敏感词，传达反奋斗价值观，容易被限流。改为「该休息就休息」更正向，保留拒绝无效内耗的立意。" },
    { id:3, level:"high", category:"煽动对立", original:"老板挂天道酬勤", suggestion:"有人拿天道酬勤", splitSuggestion:"有人拿\n天道酬勤", reason:"直接点名「老板」并搭配「哄你卖命」「坐享红利」，构成劳资对立，抖音对此类内容审核严格。改为「有人」更中性。" },
    { id:4, level:"high", category:"消极价值观", original:"螺丝钉再拼", suggestion:"方向不对再拼", splitSuggestion:"方向不对\n再拼", reason:"否定努力意义，「螺丝钉变不了发动机」暗示再拼也没用。改为「方向不对再拼」保留反思但不否定努力本身。" },
    { id:5, level:"high", category:"消极价值观", original:"卖命到底图", suggestion:"透支身体图", splitSuggestion:"透支身体图", reason:"「卖命」出现2次，搭配「图什么」构成消极反问，暗示努力无意义。改为「透支身体」更具体且不否定奋斗。" },
    { id:6, level:"medium", category:"绝对化用语", original:"永远赶不上", suggestion:"努力也追不上", splitSuggestion:"努力也\n追不上", reason:"「永远」是绝对化用语，剧情语境风险较低，但建议改为「努力也追不上」更客观。" },
    { id:7, level:"medium", category:"敏感词", original:"薪资只涨几百", suggestion:"工资只涨几百", splitSuggestion:"工资只涨\n几百", reason:"「薪资」涉嫌招聘信息，短视频平台招聘类目需报白。改为「工资」规避风险。" },
    { id:8, level:"medium", category:"谐音规避", original:"被 KFC 了", suggestion:"被洗脑了", splitSuggestion:"被洗脑了", reason:"「KFC」代「PUA」，平台可能识别为谐音规避。直接改为「被洗脑了」更清晰且无风险。" },
    { id:9, level:"medium", category:"敏感词", original:"老板还劝", suggestion:"领导还劝", splitSuggestion:"领导还劝", reason:"「老板」出现3次，虽剧情语境可过，但反复出现增加风险。部分改为「领导」降低敏感度。" },
    { id:10, level:"medium", category:"绝对化用语", original:"放弃所有", suggestion:"放弃全部休息", splitSuggestion:"放弃\n全部休息", reason:"「所有」是绝对化用语，建议改为「全部休息」或「所有假期」更具体。" },
    { id:11, level:"low", category:"敏感词", original:"赚的钱连看病", suggestion:"挣的钱不够看病", splitSuggestion:"挣的钱\n不够看病", reason:"「钱」是直播间违禁词，但口播剧情中风险较低。可改为「挣的钱」或「攒的钱」更口语化。" }
  ]
};
</script>
<script>
const LEVEL_RANK = { high:3, medium:2, low:1 };
const LEVEL_LABEL = { high:"🔴 高危", medium:"🟡 中危", low:"🟢 低危" };
const LEVEL_CLS = { high:"h", medium:"m", low:"l" };
let DATA = null;
let state = {};
let edits = {};
let sortOrder = 'risk';
let splitMode = false;
let origSplitMode = false;

function init(){
  DATA = window.REVIEW_DATA;
  if(!DATA){ document.getElementById('original').textContent='未找到审核数据'; return; }
  document.getElementById('platform').textContent = '· ' + (DATA.platform||'');
  DATA.items.forEach(it=>{ edits[it.id] = it.suggestion; state[it.id] = false; });
  renderOriginal();
  renderItems();
  compose();
  autoResizeOutput();
}
window.addEventListener('resize', autoResizeOutput);

document.querySelectorAll('.sort-btn').forEach(b=>{
  b.onclick = ()=>{
    sortOrder = b.dataset.sort;
    document.querySelectorAll('.sort-btn').forEach(x=> x.classList.toggle('on', x.dataset.sort===sortOrder));
    renderItems();
  };
});
function sortedItems(){
  const arr = DATA.items.slice();
  if(sortOrder === 'risk') arr.sort((a,b)=> (LEVEL_RANK[b.level]-LEVEL_RANK[a.level]) || (posOf(a)-posOf(b)) );
  else arr.sort((a,b)=> posOf(a) - posOf(b));
  return arr;
}
function posOf(it){ return it.original ? DATA.original.indexOf(it.original) : 999999; }

function renderOriginal(){
  const rawText = origSplitMode && DATA.splitOriginal ? DATA.splitOriginal : DATA.original;
  const NL = '\x00';
  const text = origSplitMode ? rawText.replace(/\n/g, NL) : rawText;
  const marks = [];
  DATA.items.forEach(it=>{
    if(!it.original) return;
    let idx = text.indexOf(it.original);
    while(idx !== -1){ marks.push({s:idx, e:idx+it.original.length, level:it.level}); idx = text.indexOf(it.original, idx+1); }
  });
  marks.sort((a,b)=>a.s-b.s || b.e-a.e);
  const merged = [];
  for(const m of marks){
    const last = merged[merged.length-1];
    if(last && m.s < last.e){ last.e = Math.max(last.e, m.e); last.level = topRank(last.level, m.level); }
    else merged.push({...m});
  }
  let html='', cur=0;
  for(const m of merged){
    if(m.s > cur) html += esc(text.slice(cur, m.s));
    html += `<mark class="${LEVEL_CLS[m.level]}">${esc(text.slice(m.s, m.e))}</mark>`;
    cur = m.e;
  }
  if(cur < text.length) html += esc(text.slice(cur));
  document.getElementById('original').innerHTML = origSplitMode ? html.replace(/\x00/g, '\n') : html;
}
function topRank(a,b){ return LEVEL_RANK[a] >= LEVEL_RANK[b] ? a : b; }

function renderItems(){
  const box = document.getElementById('items');
  box.innerHTML = sortedItems().map(it=>{
    const on = state[it.id];
    return `<div class="card ${on?'adopted':''}">
      <div><span class="tag ${it.level}">${LEVEL_LABEL[it.level]}</span><span class="cat">${esc(it.category||'')}</span></div>
      <div class="line">
        <span class="from">${esc(it.original)}</span>
        <span class="arrow">→</span>
        <input class="edit-sug" data-id="${it.id}" value="${escAttr(edits[it.id])}" title="可直接修改改写内容">
      </div>
      <div class="reason">${esc(it.reason||'')}</div>
      <div class="actions">
        <button class="btn yes ${on?'on':''}" data-id="${it.id}" data-act="1">✓ 采纳</button>
        <button class="btn no ${!on?'on':''}" data-id="${it.id}" data-act="0">✗ 保留原文</button>
      </div>
    </div>`;
  }).join('');
  box.querySelectorAll('button[data-act]').forEach(b=>{
    b.onclick = ()=>{ state[+b.dataset.id] = (b.dataset.act === '1'); renderItems(); compose(); };
  });
  box.querySelectorAll('input.edit-sug').forEach(inp=>{
    inp.oninput = ()=>{ edits[+inp.dataset.id] = inp.value; compose(); };
  });
}

function compose(){
  let text = splitMode && DATA.splitOriginal ? DATA.splitOriginal : DATA.original;
  const adopted = DATA.items
    .filter(it => state[it.id] && it.original && edits[it.id])
    .sort((a,b)=> LEVEL_RANK[b.level] - LEVEL_RANK[a.level]);
  // 断句模式：换行→占位符，让 indexOf 能跨行匹配
  const NL = '\x00';
  if(splitMode) text = text.replace(/\n/g, NL);
  for(const it of adopted){
    let sug = edits[it.id];
    if(!sug || sug === it.original) continue;
    // 断句模式：未手动编辑时用 splitSuggestion
    if(splitMode && it.splitSuggestion && sug === it.suggestion) sug = it.splitSuggestion;
    const ph = '\x01' + it.id + '\x01';
    text = text.split(it.original).join(ph);
    text = text.split(ph).join(sug);
  }
  if(splitMode) text = text.replace(/\x00/g, '\n');
  document.getElementById('output').value = cleanText(text);
  autoResizeOutput();
  updateSplitUI();
}
function autoResizeOutput(){
  const ta = document.getElementById('output');
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function cleanText(text){
  return text
    .replace(/【[^】]*】/g, '')
    .replace(/（[^）]*）/g, '')
    .replace(/\([^)]*\)/g, '')
    .split('\n')
    .map(l => l.replace(/^[\s　]+/, '').replace(/[\s　]+$/, ''))
    .filter(l => l.length > 0)
    .join('\n');
}

document.getElementById('origSplitBtn').addEventListener('click', ()=>{
  origSplitMode = !origSplitMode;
  renderOriginal();
  updateOrigSplitUI();
});
function updateOrigSplitUI(){
  const btn = document.getElementById('origSplitBtn');
  if(origSplitMode){ btn.classList.add('active'); btn.textContent = '↩️ 连续原文'; }
  else { btn.classList.remove('active'); btn.textContent = '✂️ 字幕断句'; }
}

document.getElementById('splitBtn').addEventListener('click', ()=>{
  splitMode = !splitMode;
  compose();
});
function updateSplitUI(){
  const btn = document.getElementById('splitBtn');
  if(splitMode){ btn.classList.add('active'); btn.textContent = '↩️ 连续原文'; }
  else { btn.classList.remove('active'); btn.textContent = '✂️ 字幕断句'; }
}

document.getElementById('copyBtn').addEventListener('click', ()=>{
  const t = document.getElementById('output').value;
  const done = ()=> toast('已复制到剪贴板');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(done).catch(fallbackCopy);
  } else { fallbackCopy(); }
  function fallbackCopy(){
    const ta = document.getElementById('output');
    ta.focus(); ta.select(); document.execCommand('copy');
    done();
  }
});
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1500); }
function esc(s){ return String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escAttr(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

init();
</script>
</body>
