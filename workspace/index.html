<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Script Studio · 工作台</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/review.css">
<link rel="stylesheet" href="css/design.css">
</head>
<body>
<div id="preloader" class="preloader" style="display:none">
  <div class="pl-card">
    <div class="pl-logo">🎬</div>
    <div class="pl-name">Script Studio</div>
    <div class="pl-bar"><i></i></div>
    <div class="pl-text">正在加载素材 <b class="pl-num">0</b> / <b class="pl-total">0</b></div>
  </div>
</div>
<div id="loginOverlay" class="login-overlay">
  <div class="login-card">
    <div class="login-logo">🎬</div>
    <div class="login-title">Script Studio</div>
    <div class="login-sub" id="loginSub">输入你的昵称，开始协作</div>
    <input id="loginInput" class="login-input" placeholder="你的昵称" autocomplete="off">
    <div class="login-btns">
      <button id="loginExit" class="btn ghost" style="display:none">退出登录</button>
      <button id="loginOk" class="btn primary">进入工作台</button>
    </div>
  </div>
</div>
<div class="topbar">
  <div class="brand">🎬 Script Studio <span class="sub" id="subTitle">工作台</span></div>
  <div class="right">
    <span class="operator" id="operatorLabel" style="display:none">操作者：<b id="operatorName"></b></span>
    <button class="btn ghost" id="importBtn" style="display:none">📂 导入</button>
    <button class="btn" id="dirBtn" style="display:none">📁 选择工作目录</button>
  </div>
</div>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main"></main>
</div>
<div id="modalRoot"></div>
<input type="file" id="fileIn" accept=".json,.html" style="display:none">
<script type="module" src="js/app.js"></script>
</body>
</html>
